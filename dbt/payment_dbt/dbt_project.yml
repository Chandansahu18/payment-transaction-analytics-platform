name: payment_dbt
profile: payment_dbt
config-version: 2
version: 1.0.0

model-paths: [models]
analysis-paths: [analyses]
test-paths: [tests]
seed-paths: [seeds]
macro-paths: [macros]
snapshot-paths: [snapshots]

target-path: target
clean-targets:
  - target
  - dbt_packages

vars:
  fraud_score_threshold: 0.7
  odd_hour_start: 1
  odd_hour_end: 5
  high_amount_threshold: 25000
  risky_merchant_categories: ['Travel', 'Electronics']
  fraud_velocity_threshold_1h: 5
  fraud_velocity_threshold_24h: 15

models:
  payment_dbt:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: table
      +schema: intermediate
    marts:
      +schema: marts
      core:
        +materialized: table
      analytics:
        +materialized: table
